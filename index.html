<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYLARAHERN.COM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

        body {
            background-color: #000000;
            font-family: 'Archivo Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            text-align: center;
            line-height: 1;
            
            /* Gradient Logic */
            background: linear-gradient(
                to bottom, 
                #e0b0ff 0%,   /* Lighter Mauve */
                #a020f0 50%,  /* Standard Purple */
                #4b0082 100%  /* Deep Indigo/Purple */
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Extra chunkiness */
            letter-spacing: -3px;
        }

        /* Responsive scaling for mobile */
        @media (max-width: 900px) {
            h1 {
                font-size: 5rem;
                letter-spacing: -1px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <h1>SKYLAR AHERN.COM</h1>

</body>
</html>
