<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Loop</title>
    <style>
        /* Dark background and center the logo */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Adjust the size of the logo here */
        .logo-video {
            width: 300px; /* Adjust width to your preference */
            height: auto;
            max-width: 80%; /* Responsive safeguard for mobile */
            /* filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); */ /* Optional: adds a subtle glow */
        }
    </style>
</head>
<body>

    <video class="logo-video" autoplay muted loop playsinline>
        <source src="assets/your-logo-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
