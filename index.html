<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skylar Ahern</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 9:16 portrait frame, largest possible with 32px border all sides */
  .frame {
    position: relative;
    width: min(100vw - 64px, (100vh - 64px) * 9 / 16);
    height: min(100vh - 64px, (100vw - 64px) * 16 / 9);
    outline: 8px solid #000;
    box-shadow: 0 0 0 1px #222;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.6s ease-in-out;
  }

  .slide.active {
    opacity: 1;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    filter: grayscale(100%);
  }

  .dots {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.4s ease, transform 0.4s ease;
    cursor: pointer;
    border: none;
  }

  .dot.active {
    background: rgba(255,255,255,0.85);
    transform: scale(1.35);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="frame" id="gallery">
    <div class="slide active"><img src="assets/1.png" alt=""></div>
    <div class="slide"><img src="assets/2.png" alt=""></div>
    <div class="slide"><img src="assets/3.png" alt=""></div>
    <div class="slide"><img src="assets/4.png" alt=""></div>
    <div class="slide"><img src="assets/5.png" alt=""></div>
    <div class="slide"><img src="assets/6.png" alt=""></div>
    <div class="slide"><img src="assets/7.png" alt=""></div>
    <div class="slide"><img src="assets/8.png" alt=""></div>
    <div class="slide"><img src="assets/9.png" alt=""></div>
    <div class="slide"><img src="assets/10.png" alt=""></div>
    <div class="slide"><img src="assets/11.png" alt=""></div>
    <div class="slide"><img src="assets/12.png" alt=""></div>
  </div>
</div>

<div class="dots" id="dots"></div>

<script>
  const slides = document.querySelectorAll('.slide');
  const dotsContainer = document.getElementById('dots');
  let current = 0;
  let timer;

  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', 'Go to image ' + (i + 1));
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  const dots = document.querySelectorAll('.dot');

  function goTo(index) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = index;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    resetTimer();
  }

  function next() {
    goTo((current + 1) % slides.length);
  }

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(next, 5000);
  }

  resetTimer();
</script>
</body>
</html>
