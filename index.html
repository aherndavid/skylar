<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYLAR AHERN.COM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

        body {
            background-color: #000000;
            font-family: 'Archivo Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
            text-transform: uppercase;
            text-align: center;
            line-height: 1;
            letter-spacing: -9px;

            /* 1. Define the Gradient with multiple shades */
            background: linear-gradient(
                45deg, 
                #a020f0, /* Purple */
                #e0b0ff, /* Mauve */
                #4b0082, /* Indigo */
                #d891ef, /* Bright Lavender */
                #a020f0  /* Back to Purple for seamless loop */
            );

            /* 2. Make the background large so we can move it */
            background-size: 400% 400%;

            /* 3. Clip the background to the text */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* 4. Apply the animation */
            animation: gradientCycle 8s ease infinite;
        }

        /* The Animation logic */
        @keyframes gradientCycle {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @media (max-width: 800px) {
            h1 {
                font-size: 3rem;
                letter-spacing: -1px;
            }
        }
    </style>
</head>
<body>

    <h1>SKYLA AHERN.COM</h1>

</body>
</html>
