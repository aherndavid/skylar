<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Loop</title>
    <style>
        /* Ensure the background is pitch black */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden; /* Prevents scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Make the video fill the screen while maintaining aspect ratio */
        video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover; /* Change to 'contain' if you don't want the video cropped */
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline>
        <source src="assets/skylarahern-logo.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
